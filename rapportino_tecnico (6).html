<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Rapportini">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffffff">
<title>Rapportini Tecnici</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f5;--bg3:#eeeeee;
  --text:#111111;--text2:#666666;--text3:#999999;
  --border:#dddddd;--border2:#cccccc;
  --green:#1D9E75;--red:#E24B4A;--blue:#1a73e8;
  --green-bg:#e8f5f0;--warn-bg:#fff8e1;--warn:#b45309;
  --radius:10px;--radius-sm:7px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
    --text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;
    --border:#3a3a3c;--border2:#48484a;
    --green-bg:#0a2e20;--warn-bg:#2e2200;--warn:#fbbf24;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh}
.app{max-width:480px;margin:0 auto;background:var(--bg);min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;display:flex;flex-direction:column;position:sticky;top:0;z-index:10}
.topbar-header{display:flex;align-items:center;justify-content:space-between;padding:10px 0 6px}
.topbar-title{font-size:13px;font-weight:600;color:var(--text)}
.topbar-version{font-size:11px;color:var(--text3);background:var(--bg3);padding:2px 8px;border-radius:20px}
.topbar-tabs{display:flex;gap:0}
.tab{flex:1;padding:10px 4px;font-size:14px;font-weight:500;text-align:center;cursor:pointer;border:none;background:transparent;color:var(--text2);border-bottom:2.5px solid transparent;transition:all .2s;-webkit-tap-highlight-color:transparent}
.tab.active{color:var(--text);border-bottom:2.5px solid var(--text)}
.content{padding:16px;flex:1}
.section-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin:0 0 10px}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;color:var(--text2);margin-bottom:5px}
.field input,.field textarea{width:100%;padding:11px 13px;font-size:16px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-family:inherit;-webkit-appearance:none;appearance:none}
.field textarea{resize:none;min-height:110px;line-height:1.5}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,115,232,.15)}
.field input:disabled,.field textarea:disabled{background:var(--bg2);color:var(--text3);cursor:not-allowed}
.ac-wrap{position:relative}
.ac-list{position:absolute;top:calc(100% + 2px);left:0;right:0;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius-sm);z-index:20;max-height:160px;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.12)}
.ac-item{padding:11px 13px;font-size:15px;cursor:pointer;border-bottom:1px solid var(--border);-webkit-tap-highlight-color:transparent}
.ac-item:last-child{border-bottom:none}
.ac-item:active{background:var(--bg2)}
.ac-new{padding:11px 13px;font-size:14px;cursor:pointer;color:var(--blue);display:flex;align-items:center;gap:6px;-webkit-tap-highlight-color:transparent}
.btn{width:100%;padding:14px;font-size:16px;font-weight:500;border-radius:var(--radius);border:none;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;-webkit-tap-highlight-color:transparent}
.btn:last-child{margin-bottom:0}
.btn-primary{background:var(--text);color:var(--bg)}
.btn-success{background:var(--green);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border2)}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.time-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.time-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 13px}
.tc-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.tc-val{font-size:13px;font-weight:500;color:var(--text);margin-top:5px;line-height:1.35}
.info-banner{border-radius:var(--radius-sm);padding:11px 14px;margin-bottom:14px;font-size:14px;display:flex;align-items:flex-start;gap:9px;line-height:1.5}
.banner-green{background:var(--green-bg);color:var(--green)}
.banner-warn{background:var(--warn-bg);color:var(--warn)}
.divider{height:1px;background:var(--border);margin:16px 0}
.preview-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px}
.preview-row{padding:11px 14px;border-bottom:1px solid var(--border)}
.preview-row:last-child{border-bottom:none}
.preview-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:3px}
.preview-val{font-size:15px;color:var(--text);line-height:1.5}
.screen-title{font-size:20px;font-weight:600;color:var(--text);margin-bottom:6px}
.screen-sub{font-size:14px;color:var(--text2);margin-bottom:18px;line-height:1.6}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:12px 20px;border-radius:30px;font-size:14px;display:flex;align-items:center;gap:8px;z-index:100;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.25);opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.cust-item{display:flex;align-items:center;padding:11px 0;border-bottom:1px solid var(--border)}
.cust-item:last-child{border-bottom:none}
.del-btn{background:none;border:none;cursor:pointer;color:var(--red);font-size:20px;padding:4px 8px;line-height:1;-webkit-tap-highlight-color:transparent}
svg.icon{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;vertical-align:middle}
/* FOTO */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.photo-thumb{position:relative;aspect-ratio:1;border-radius:var(--radius-sm);overflow:hidden;background:var(--bg2)}
.photo-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.photo-del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.65);border:none;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;padding:0;-webkit-tap-highlight-color:transparent}
.photo-del svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.photo-add{aspect-ratio:1;border-radius:var(--radius-sm);border:1.5px dashed var(--border2);background:var(--bg2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;color:var(--text2);font-size:12px;-webkit-tap-highlight-color:transparent;user-select:none}
.photo-add:active{background:var(--bg3)}
.photo-add svg{width:26px;height:26px;stroke:var(--text2);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app" id="app">
  <div id="topbar-slot"></div>
  <div id="content-slot"></div>
  <div id="toast-el" class="toast"></div>
</div>
<script>
/* ======== ICONE ======== */
const IC = {
  play:'<svg class="icon" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>',
  stop:'<svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>',
  mail:'<svg class="icon" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>',
  send:'<svg class="icon" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>',
  save:'<svg class="icon" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>',
  back:'<svg class="icon" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>',
  plus:'<svg class="icon" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
  trash:'<svg class="icon" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
  user:'<svg class="icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
  warn:'<svg class="icon" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
  clock:'<svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
  refresh:'<svg class="icon" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>',
  check:'<svg class="icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>',
  settings:'<svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',
  clipboard:'<svg class="icon" viewBox="0 0 24 24"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg>',
  camera:'<svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>',
  x:'<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
};

/* ======== STATO ======== */
const S = {
  tab:'lavoro', screen:'main',
  config:{email:'',techName:''},
  customers:[],
  work:{customer:'',startTime:null,endTime:null,description:''},
  photos:[], // array di stringhe base64
};

const $ = id => document.getElementById(id);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');

function fmt(dt){
  if(!dt) return '—';
  return dt.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+
         dt.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
}

/* ======== STORAGE ======== */
function load(){
  try{ const c=localStorage.getItem('rapp_config'); if(c) S.config=JSON.parse(c); }catch(e){}
  try{ const c=localStorage.getItem('rapp_customers'); if(c) S.customers=JSON.parse(c); }catch(e){}
  try{
    const w=localStorage.getItem('rapp_work');
    if(w){
      const p=JSON.parse(w);
      if(p.startTime) p.startTime=new Date(p.startTime);
      if(p.endTime)   p.endTime=new Date(p.endTime);
      S.work=p;
      if(S.work.endTime) S.screen='preview';
    }
  }catch(e){}
  try{ const ph=localStorage.getItem('rapp_photos'); if(ph) S.photos=JSON.parse(ph); }catch(e){}
  render();
}

function saveConfig(){ localStorage.setItem('rapp_config',JSON.stringify(S.config)); toast('Configurazione salvata'); }
function saveCustomers(){ localStorage.setItem('rapp_customers',JSON.stringify(S.customers)); }
function saveWork(){ localStorage.setItem('rapp_work',JSON.stringify(S.work)); }
function savePhotos(){
  try{ localStorage.setItem('rapp_photos',JSON.stringify(S.photos)); }
  catch(e){ toast('Spazio esaurito: prova a eliminare alcune foto'); }
}
function clearWork(){ localStorage.removeItem('rapp_work'); localStorage.removeItem('rapp_photos'); }

function addCustomerIfNew(name){
  const n=name.trim();
  if(n&&!S.customers.includes(n)){ S.customers.push(n); saveCustomers(); }
}

let toastTimer;
function toast(msg){
  clearTimeout(toastTimer);
  const el=$('toast-el');
  el.innerHTML=IC.check+' '+esc(msg);
  el.classList.add('show');
  toastTimer=setTimeout(()=>el.classList.remove('show'),2800);
}

/* ======== COMPRESSIONE FOTO ======== */
// Riduce ogni foto a max 900px e qualità 0.75 → circa 150-300KB per foto
function compressImage(file){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const MAX=900;
        let {width:w,height:h}=img;
        if(w>h){ if(w>MAX){h=Math.round(h*MAX/w);w=MAX;} }
        else { if(h>MAX){w=Math.round(w*MAX/h);h=MAX;} }
        const canvas=document.createElement('canvas');
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',0.75));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function addPhotos(input){
  const files=Array.from(input.files||[]);
  if(!files.length) return;
  const remaining=10-S.photos.length;
  const toProcess=files.slice(0,remaining);

  // mostra spinner sul bottone aggiungi
  const addBtn=$('photo-add-btn');
  if(addBtn){ addBtn.innerHTML='<div class="spinner"></div>'; }

  for(const f of toProcess){
    if(!f.type.startsWith('image/')) continue;
    try{
      const b64=await compressImage(f);
      S.photos.push(b64);
    }catch(e){ console.warn('Errore compressione foto',e); }
  }
  savePhotos();
  renderPhotoGrid();
  // reset input così si può riselezionare la stessa foto
  input.value='';
}

function removePhoto(i){
  S.photos.splice(i,1);
  savePhotos();
  renderPhotoGrid();
}

function renderPhotoGrid(){
  const grid=$('photo-grid');
  if(!grid) return;
  let html='';
  S.photos.forEach((b64,i)=>{
    html+=`<div class="photo-thumb">
      <img src="${b64}" loading="lazy" />
      <button class="photo-del" onclick="removePhoto(${i})" aria-label="Elimina foto">
        ${IC.x}
      </button>
    </div>`;
  });
  if(S.photos.length<10){
    html+=`<label class="photo-add" id="photo-add-btn" for="photo-inp" aria-label="Aggiungi foto">
      ${IC.camera}
      <span>Aggiungi</span>
    </label>`;
  }
  grid.innerHTML=html;
}

/* ======== EMAIL ======== */
function buildBody(){
  const n=S.photos.length;
  const fotoNote=n>0?'\n\n('+n+' foto inviate separatamente)':'';
  return 'Tecnico: '+S.config.techName+
    '\nCliente: '+S.work.customer+
    '\nInizio lavoro: '+fmt(S.work.startTime)+
    '\nFine lavoro: '+fmt(S.work.endTime)+
    '\n\nDescrizione:\n'+S.work.description+fotoNote;
}

function sendEmail(){
  const to  = encodeURIComponent(S.config.email);
  const sub = encodeURIComponent('Rapportino - '+S.work.customer);
  const body= encodeURIComponent(buildBody());
  window.location.href='mailto:'+to+'?subject='+sub+'&body='+body;
}

function b64toFile(b64,i){
  const arr=b64.split(',');
  const mime=arr[0].match(/:(.*?);/)[1];
  const bstr=atob(arr[1]); let n=bstr.length;
  const u8=new Uint8Array(n); while(n--) u8[n]=bstr.charCodeAt(n);
  return new File([u8],'foto_'+(i+1)+'.jpg',{type:mime});
}

async function sharePhotos(){
  if(!S.photos.length) return;
  const testo = buildBody();
  try{
    const files=S.photos.map((b64,i)=>b64toFile(b64,i));
    const shareData={title:'Rapportino - '+S.work.customer, text:testo, files};
    if(navigator.canShare && navigator.canShare(shareData)){
      await navigator.share(shareData);
    } else if(navigator.canShare && navigator.canShare({files})){
      await navigator.share({title:'Rapportino - '+S.work.customer, files});
    } else {
      toast('Condivisione non supportata da questo browser');
    }
  }catch(e){
    if(e.name!=='AbortError') toast('Errore condivisione');
  }
}

/* ======== RENDER ======== */
function render(){ renderTopbar(); renderContent(); }

function renderTopbar(){
  $('topbar-slot').innerHTML=`
    <div class="topbar">
      <div class="topbar-header">
        <span class="topbar-title">Rapportini Tecnici</span>
        <span class="topbar-version">v1.3</span>
      </div>
      <div class="topbar-tabs">
        <button class="tab ${S.tab==='lavoro'?'active':''}" onclick="switchTab('lavoro')">${IC.clipboard} Lavoro</button>
        <button class="tab ${S.tab==='config'?'active':''}" onclick="switchTab('config')">${IC.settings} Configurazione</button>
      </div>
    </div>`;
}

function switchTab(t){ S.tab=t; S.screen='main'; render(); }

function renderContent(){
  if(S.tab==='config'){ renderConfig(); return; }
  if(S.screen==='preview'){ renderPreview(); return; }
  if(S.screen==='sent'){ renderSent(); return; }
  if(S.screen==='reset-confirm'){ renderResetConfirm(); return; }
  renderMain();
}

/* ---- CONFIG ---- */
function renderConfig(){
  $('content-slot').innerHTML=`
    <div class="content">
      <p class="section-title">Impostazioni</p>
      <div class="field">
        <label>Nome tecnico</label>
        <input type="text" placeholder="Es. Mario Rossi" value="${esc(S.config.techName)}" onchange="S.config.techName=this.value" />
      </div>
      <div class="field">
        <label>Email destinatario rapportini</label>
        <input type="email" inputmode="email" placeholder="es. ufficio@azienda.it" value="${esc(S.config.email)}" onchange="S.config.email=this.value" />
      </div>
      <button class="btn btn-primary" onclick="saveConfig()">${IC.save} Salva configurazione</button>
      <div class="divider"></div>
      <p class="section-title">Clienti salvati (${S.customers.length})</p>
      ${S.customers.length===0
        ?`<p style="font-size:14px;color:var(--text2);line-height:1.6">Nessun cliente ancora. Vengono aggiunti automaticamente al primo rapportino.</p>`
        :`<div>${S.customers.map((c,i)=>`
          <div class="cust-item">
            <span style="margin-right:10px;color:var(--text2)">${IC.user}</span>
            <span style="flex:1;font-size:15px">${esc(c)}</span>
            <button class="del-btn" onclick="delCustomer(${i})">${IC.trash}</button>
          </div>`).join('')}</div>`}
    </div>`;
}

function delCustomer(i){ S.customers.splice(i,1); saveCustomers(); render(); }

/* ---- SCHERMATA LAVORO PRINCIPALE ---- */
function renderMain(){
  const w=S.work;
  const started=!!w.startTime, ended=!!w.endTime;
  const missingCfg=!S.config.email||!S.config.techName;
  const canStart=!started&&w.customer.trim()&&!missingCfg;
  const canEnd=started&&w.customer.trim()&&w.description.trim();

  $('content-slot').innerHTML=`
    <div class="content">
      <p class="section-title">Cliente</p>
      <div class="field ac-wrap" id="ac-wrap">
        <label>Nome cliente</label>
        <input type="text" id="cust-inp" autocomplete="off"
          placeholder="Cerca o inserisci cliente..."
          value="${esc(w.customer)}"
          ${started?'disabled':''}
          oninput="onCustInput(this.value)"
          onfocus="onCustFocus()" />
        <div id="ac-list-slot"></div>
      </div>

      ${missingCfg&&!started?`<div class="info-banner banner-warn">${IC.warn}
        <span>Vai in <strong>Configurazione</strong> e inserisci nome tecnico ed email.</span></div>`:''}

      ${started?`<div class="info-banner banner-green">${IC.clock}
        <span>Lavoro in corso per <strong>${esc(w.customer)}</strong></span></div>`:''}

      <div class="time-row">
        <div class="time-card"><div class="tc-label">Inizio</div><div class="tc-val">${started?fmt(w.startTime):'—'}</div></div>
        <div class="time-card"><div class="tc-label">Fine</div><div class="tc-val">${ended?fmt(w.endTime):'—'}</div></div>
      </div>

      <div class="field">
        <label>Descrizione lavoro</label>
        <textarea id="desc-inp" placeholder="Descrivi il lavoro svolto..."
          oninput="S.work.description=this.value;saveWork();updateEndBtn()"
          ${!started?'disabled':''}>${esc(w.description)}</textarea>
      </div>

      ${started?`
      <div class="field">
        <label>Foto (${S.photos.length}/10)</label>
        <input type="file" id="photo-inp" accept="image/*" multiple
          style="display:none" onchange="addPhotos(this)" />
        <div class="photo-grid" id="photo-grid"></div>
      </div>`:''}

      ${!started?`<button class="btn btn-success" id="start-btn" ${canStart?'':'disabled'} onclick="startWork()">${IC.play} Inizio lavoro</button>`:''}
      ${started&&!ended?`<button class="btn btn-danger" id="end-btn" ${canEnd?'':'disabled'} onclick="endWork()">${IC.stop} Fine lavoro</button>`:''}
      ${ended?`<button class="btn btn-primary" onclick="goPreview()">${IC.mail} Anteprima e invia rapportino</button>`:''}
      ${started?`<button class="btn btn-outline" onclick="S.screen='reset-confirm';render()">${IC.refresh} Annulla e ricomincia</button>`:''}
    </div>`;

  document.addEventListener('click',onDocClick);
  if(started) setTimeout(renderPhotoGrid,0);
}

/* ---- AUTOCOMPLETE ---- */
function filteredCustomers(q){
  if(!q.trim()) return [];
  return S.customers.filter(c=>c.toLowerCase().includes(q.toLowerCase()));
}
function renderAcList(q){
  const slot=$('ac-list-slot'); if(!slot) return;
  const fc=filteredCustomers(q);
  if(!q.trim()||(!fc.length&&!q.trim())){ slot.innerHTML=''; return; }
  const exact=S.customers.includes(q.trim());
  let html='<div class="ac-list">';
  fc.forEach(c=>{ html+=`<div class="ac-item" onmousedown="selectCust('${esc(c)}')">${esc(c)}</div>`; });
  if(!exact&&q.trim()) html+=`<div class="ac-new" onmousedown="selectCust('${esc(q.trim())}',true)">${IC.plus} Aggiungi "${esc(q.trim())}"</div>`;
  html+='</div>';
  slot.innerHTML=(fc.length>0||(!exact&&q.trim()))?html:'';
}
function hideAcList(){ const s=$('ac-list-slot'); if(s) s.innerHTML=''; }
function onCustInput(v){
  S.work.customer=v; renderAcList(v);
  const b=$('start-btn'); if(b) b.disabled=!(v.trim()&&S.config.email&&S.config.techName);
}
function onCustFocus(){ renderAcList(S.work.customer); }
function selectCust(name,isNew){
  S.work.customer=name;
  const inp=$('cust-inp'); if(inp) inp.value=name;
  hideAcList();
  if(isNew) addCustomerIfNew(name);
  const b=$('start-btn'); if(b) b.disabled=!(name.trim()&&S.config.email&&S.config.techName);
}
function onDocClick(e){ const w=$('ac-wrap'); if(w&&!w.contains(e.target)) hideAcList(); }
function updateEndBtn(){
  const b=$('end-btn');
  if(b) b.disabled=!(S.work.startTime&&S.work.customer.trim()&&S.work.description.trim());
}

/* ---- AZIONI ---- */
function startWork(){
  const name=S.work.customer.trim(); if(!name) return;
  addCustomerIfNew(name);
  S.work.startTime=new Date();
  saveWork();
  document.removeEventListener('click',onDocClick);
  render();
  toast('Lavoro iniziato: '+fmt(S.work.startTime));
}
function endWork(){
  S.work.endTime=new Date(); saveWork();
  document.removeEventListener('click',onDocClick);
  S.screen='preview'; render();
}
function goPreview(){ S.screen='preview'; render(); }

async function confirmSend(){
  // Mostra schermata invio in corso
  $('content-slot').innerHTML=`
    <div class="content" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:16px">
      <div class="spinner" style="width:36px;height:36px;border:3px solid rgba(0,0,0,.15);border-top-color:var(--text);border-radius:50%;animation:spin .7s linear infinite"></div>
      <p style="font-size:16px;color:var(--text2)">Invio in corso${S.photos.length>0?' con '+S.photos.length+' foto...':'...'}</p>
    </div>`;
  sendEmail();
  S.screen='sent';
  render();
  if(S.photos.length>0){
    setTimeout(()=>sharePhotos(), 1500);
  }
}

function clearAll(){
  S.work={customer:'',startTime:null,endTime:null,description:''}; S.photos=[];
  S.screen='main'; clearWork();
  document.removeEventListener('click',onDocClick); render();
}

/* ---- ANTEPRIMA ---- */
function renderPreview(){
  const w=S.work;
  const hasFoto=S.photos.length>0;
  $('content-slot').innerHTML=`
    <div class="content">
      <p class="screen-title">Anteprima rapportino</p>
      <p class="screen-sub">Controlla i dati. Se tutto è corretto premi "Invia".${hasFoto?' L\'email si apre con il testo, poi le foto vengono inviate automaticamente.':''}</p>
      <div class="preview-panel">
        <div class="preview-row"><div class="preview-label">Destinatario</div><div class="preview-val">${esc(S.config.email)}</div></div>
        <div class="preview-row"><div class="preview-label">Oggetto</div><div class="preview-val">Rapportino</div></div>
        <div class="preview-row"><div class="preview-label">Tecnico</div><div class="preview-val">${esc(S.config.techName)}</div></div>
        <div class="preview-row"><div class="preview-label">Cliente</div><div class="preview-val">${esc(w.customer)}</div></div>
        <div class="preview-row"><div class="preview-label">Inizio lavoro</div><div class="preview-val">${fmt(w.startTime)}</div></div>
        <div class="preview-row"><div class="preview-label">Fine lavoro</div><div class="preview-val">${fmt(w.endTime)}</div></div>
        <div class="preview-row"><div class="preview-label">Descrizione</div><div class="preview-val" style="white-space:pre-wrap">${esc(w.description)}</div></div>
        ${hasFoto?`<div class="preview-row">
          <div class="preview-label">Foto (${S.photos.length})</div>
          <div class="photo-grid" style="margin-top:8px" id="preview-photos"></div>
        </div>`:''}
      </div>
      <button class="btn btn-primary" onclick="confirmSend()">${IC.send} Invia rapportino${hasFoto?' + '+S.photos.length+' foto':''}</button>
      <button class="btn btn-outline" onclick="S.screen='main';render()">${IC.back} Torna indietro e modifica</button>
    </div>`;
  setTimeout(()=>{
    const grid=$('preview-photos'); if(!grid) return;
    grid.innerHTML=S.photos.map(b64=>`<div class="photo-thumb"><img src="${b64}" loading="lazy"/></div>`).join('');
  },0);
}

function renderSent(){
  $('content-slot').innerHTML=`
    <div class="content">
      <p class="screen-title">Rapportino inviato!</p>
      <p class="screen-sub">Il client email è stato aperto con il rapportino.${S.photos.length>0?' Le foto si stanno aprendo per la condivisione.':''}</p>
      ${S.photos.length>0?`<button class="btn btn-outline" onclick="sharePhotos()">${IC.camera} Condividi le foto (se non aperto)</button>`:''}
      <button class="btn btn-primary" onclick="clearAll()">${IC.plus} Nuovo rapportino</button>
      <button class="btn btn-outline" onclick="S.screen='preview';render()">${IC.back} Torna all'anteprima</button>
    </div>`;
}

function renderResetConfirm(){
  $('content-slot').innerHTML=`
    <div class="content">
      <p class="screen-title">Annulla rapportino</p>
      <p class="screen-sub">Sei sicuro? I dati e le foto inserite andranno persi.</p>
      <button class="btn btn-danger" onclick="clearAll()">${IC.trash} Sì, annulla e azzera</button>
      <button class="btn btn-outline" onclick="S.screen='main';render()">${IC.back} No, torna al rapportino</button>
    </div>`;
}

load();

/* ======== SERVICE WORKER INLINE (funzionamento offline) ======== */
if('serviceWorker' in navigator){
  const swCode = `
const CACHE = 'rapportini-v1';
self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE).then(c => c.addAll([self.location.href.replace('/sw.js','')||'/']))
  );
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(clients.claim());
});
self.addEventListener('fetch', e => {
  e.respondWith(
    caches.match(e.request).then(r => r || fetch(e.request).then(res => {
      const clone = res.clone();
      caches.open(CACHE).then(c => c.put(e.request, clone));
      return res;
    }).catch(() => caches.match(e.request)))
  );
});`;
  const blob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}
</script>
</body>
</html>
